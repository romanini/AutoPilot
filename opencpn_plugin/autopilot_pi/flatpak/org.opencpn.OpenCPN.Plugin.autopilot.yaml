app-id: org.opencpn.OpenCPN.Plugin.autopilot
branch: stable

# Builds autopilot_pi as a Flatpak extension of the installed OpenCPN Flatpak.
# The OpenCPN Flatpak declares extension point org.opencpn.OpenCPN.Plugin with
# merge-dirs=lib/opencpn, so our plugin .so ends up in that merged path.
#
# Pre-requisites on the OrangePi (run once):
#   sudo apt install flatpak-builder
#   flatpak install flathub org.freedesktop.Sdk//25.08
#
# Build and install:
#   cd opencpn_plugin/autopilot_pi
#   flatpak-builder --user --install --force-clean build-dir flatpak/org.opencpn.OpenCPN.Plugin.autopilot.yaml
#
# Verify:
#   flatpak info org.opencpn.OpenCPN.Plugin.autopilot
#   # Then launch OpenCPN → Plugin Manager → should show "AutoPilot"

runtime: org.opencpn.OpenCPN
runtime-version: stable
sdk: org.freedesktop.Sdk//25.08

build-extension: true

# Extension mount point declared by OpenCPN: directory=extensions
# merge-dirs=lib/opencpn means OpenCPN sees a merged /app/extensions/lib/opencpn/
# containing .so files from all installed Plugin extensions.
build-options:
  cflags: -O2 -DFLATPAK
  cxxflags: -O2 -DFLATPAK
  prefix: /app/extensions/autopilot
  libdir: /app/extensions/autopilot/lib

modules:
  - name: autopilot_pi
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      # ocpn_plugin.h is bundled in include/ — no external clone needed.
    sources:
      - type: dir
        path: ..
